steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/b-20-489711/tcc-be-rest-015', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/b-20-489711/tcc-be-rest-015']
- name: 'gcr.io/cloud-builders/gcloud'
  args: ['run', 'deploy', 'be-rest', '--image', 'gcr.io/b-20-489711/tcc-be-rest-015', '--region', 'us-central1', '--allow-unauthenticated']


options:
  logging: CLOUD_LOGGING_ONLY
